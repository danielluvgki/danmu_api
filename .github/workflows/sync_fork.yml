name: Fork Sync

# 恢复合法的权限声明
permissions:
  contents: write
  actions: write

on:
    schedule:
        - cron: "0 0 * * *"  # 每天午夜执行
    workflow_dispatch:  # 允许手动触发

jobs:
    sync_with_upstream:
        name: Sync with Upstream
        runs-on: ubuntu-latest
        if: ${{ github.event.repository.fork }}
        
        steps:
            - name: Checkout target repo
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
                # 关键点：使用你创建的 PAT 替换默认 token，这样才有权同步工作流文件
                token: ${{ secrets.SYNC_PAT }}

            - name: Sync Upstream
              uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
              with:
                  # 这里的 token 也要同步更换
                  target_repo_token: ${{ secrets.SYNC_PAT }}
                  upstream_sync_repo: huangxd-/danmu_api
                  upstream_sync_branch: main
                  target_sync_branch: main
                  test_mode: false

            - name: Check for new commits
              if: success()
              run: echo "Sync completed successfully"

            - name: Check for Failure
              if: failure()
              run: |
                  echo "[Error] Sync failed."
                  echo "如果依然报错，请确保 SYNC_PAT 具有 'workflow' 权限且已正确添加到 Repository Secrets 中。"
                  exit 1
